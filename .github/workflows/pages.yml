name: Deploy assets to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare site files
        run: |
          mkdir -p public/photo_studio
          mkdir -p public/gizmo
          mkdir -p public/flipbook-test/assets
          # Copy the actual LFS binaries into the site artifact.
          cp -v photo_studio/skybox.ktx2 photo_studio/env.ktx2 photo_studio/irradiance.ktx2 public/photo_studio
          cp -v gizmo/gizmo.glb public/gizmo
          # flipbook-test scene fixture — fetched at runtime by the
          # scene-editor's `load_external_test_scene("flipbook-test")`
          # wasm export against the production
          # `MEDIA_BASE_URL_ADDITIONAL_ASSETS` URL. Ships project.json +
          # every raster asset under flipbook-test/assets/. Add new
          # scenes the same way: one extra `cp -v` per fixture.
          cp -v flipbook-test/project.json public/flipbook-test/
          cp -v flipbook-test/assets/*.png public/flipbook-test/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
